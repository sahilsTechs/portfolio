<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I Love You Diku 💗</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #ffc2e5, #ff6fcf);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        /* Floating Hearts Background */
        .heart {
            position: absolute;
            animation: float 6s linear infinite;
            opacity: 0.7;
            pointer-events: none;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0.8);
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) scale(1.4);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            animation: fadeIn 1.5s ease forwards;
        }

        .love-icon {
            font-size: 80px;
            animation: beat 1s ease infinite alternate;
            filter: drop-shadow(0 0 16px #ff1493);
        }

        @keyframes beat {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.22);
            }
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            margin-top: 14px;
            opacity: 0;
            animation: slideUp 1.4s .3s ease forwards, glow 1.6s 1.4s ease-in-out infinite alternate;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 12px white, 0 0 22px #ff69c2;
            }

            to {
                text-shadow: 0 0 18px white, 0 0 32px #ff1493;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(.94);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <!-- Hearts generator -->
    <script>
        const heartCount = 22;
        const icons = ["💗", "💕", "💓", "💖", "💞", "🌸", "💐"];
        for (let i = 0; i < heartCount; i++) {
            let h = document.createElement("div");
            h.className = "heart";
            h.innerText = icons[Math.floor(Math.random() * icons.length)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = (3 + Math.random() * 4) + "s";
            h.style.fontSize = (20 + Math.random() * 30) + "px";
            document.body.appendChild(h);
        }
    </script>

    <!-- Love Content -->
    <div class="container">
        <div class="love-icon">💖</div>
        <h1>I Love You Diku 😍💗</h1>
    </div>

</body>

</html>
