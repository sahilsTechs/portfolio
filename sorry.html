<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorry Bhumi 💗</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #ffb6e0, #ff69b4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .container {
            padding: 22px;
            max-width: 400px;
            animation: fadeIn 1.4s ease;
        }

        .emoji {
            font-size: 70px;
            animation: bounce 1.2s infinite alternate;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-top: 10px;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            margin-top: 6px;
        }

        .btn {
            margin-top: 18px;
            display: inline-block;
            background: white;
            color: #ff1493;
            padding: 11px 17px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(255, 20, 147, 0.35);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.06);
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.48);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(12px);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="emoji">💐</div>
        <h1>Sorry, Bhumi 💗</h1>
        <p> 🌷
        </p>
        <!-- <a href="index.html" class="btn">Go Back 🌸</a> -->
    </div>

</body>

</html>
